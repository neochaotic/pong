<svg xmlns="http://www.w3.org/2000/svg" width="492" height="390" viewBox="0 0 492 390" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif">
  <rect width="492" height="390" rx="14" fill="#161616"/>

  <!-- help button -->
  <circle cx="452" cy="40" r="18" fill="#2c2c2e"/>
  <text x="452" y="46" text-anchor="middle" fill="#9a9a9e" font-size="16" font-weight="600">?</text>

  <!-- warning triangle -->
  <path d="M62 26 L104 96 L20 96 Z" fill="#f0b429" stroke="#161616" stroke-width="3" stroke-linejoin="round"/>
  <rect x="58" y="52" width="8" height="26" rx="3" fill="#161616"/>
  <rect x="58" y="84" width="8" height="8" rx="3" fill="#161616"/>

  <!-- title -->
  <text x="24" y="150" fill="#f2f2f2" font-size="20" font-weight="700">&#8220;Pong.app&#8221; is damaged and</text>
  <text x="24" y="176" fill="#f2f2f2" font-size="20" font-weight="700">can&#8217;t be opened. You should</text>
  <text x="24" y="202" fill="#f2f2f2" font-size="20" font-weight="700">move it to the Trash.</text>

  <!-- subtext -->
  <text x="24" y="234" fill="#8e8e93" font-size="14">Chrome downloaded this file today at 18:46.</text>

  <!-- divider -->
  <line x1="0" y1="256" x2="492" y2="256" stroke="#2c2c2e" stroke-width="1"/>

  <!-- move to trash button -->
  <rect x="20" y="272" width="452" height="42" rx="10" fill="#2c2c2e"/>
  <text x="246" y="298" text-anchor="middle" fill="#f2f2f2" font-size="15" font-weight="600">Move to Trash</text>

  <!-- cancel button -->
  <rect x="20" y="324" width="452" height="42" rx="10" fill="#2c2c2e"/>
  <text x="246" y="350" text-anchor="middle" fill="#f2f2f2" font-size="15" font-weight="600">Cancel</text>
</svg>
