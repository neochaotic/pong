name: Publish to dev.to

# Pushes articles/*.md to dev.to via the devto-cli (sinedied/publish-devto).
#
# Safety model:
# - A push to main runs a DRY RUN (preview only) — it never publishes or commits.
# - Real publishing happens only via the manual "Run workflow" button with the
#   `dry_run` checkbox UNCHECKED. Articles with `published: false` go up as DRAFTS;
#   flip a file to `published: true` to make that post go live.
# - On a real (non-dry) publish the action writes an `id:` back into the file's
#   frontmatter and commits it, so later edits update the same post.
#
# Requires one repository secret: DEVTO_TOKEN (a dev.to "DEV Community API Key"
# from https://dev.to/settings/extensions). Without it, this workflow no-ops.

on:
  push:
    branches: [main]
    paths:
      - "articles/**/*.md"
      - ".github/workflows/publish-devto.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only — do not publish or commit ids"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # the publish step commits the returned article id back to the repo
    if: ${{ github.repository == 'neochaotic/pong' }}
    steps:
      - uses: actions/checkout@v7
      - name: Check for DEVTO_TOKEN
        # Neither job- nor step-level `if:` can see `secrets` directly — only
        # `env:`/`with:` can — so route it through a step output instead of
        # letting the publish step fail outright on a missing key.
        id: devto
        env:
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: echo "present=${DEVTO_TOKEN:+true}" >> "$GITHUB_OUTPUT"
      - name: Publish articles on dev.to
        if: steps.devto.outputs.present == 'true'
        uses: sinedied/publish-devto@v2
        env:
          GIT_COMMITTER_NAME: neochaotic
          GIT_COMMITTER_EMAIL: alisson.david.rosa@gmail.com
        with:
          devto_key: ${{ secrets.DEVTO_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: "articles/**/*.md"
          branch: main
          conventional_commits: true
          # push → always dry run (preview). Real publish only via manual dispatch
          # with the dry_run checkbox unchecked.
          dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || github.event_name == 'push' }}
