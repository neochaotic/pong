name: Release

# Tag a version to publish installers:
#   git tag v0.0.1-rc.1 && git push origin v0.0.1-rc.1   -> marked pre-release
#   git tag v0.0.1       && git push origin v0.0.1         -> marked stable
#
# The tag carries the pre-release identifier; the manifests stay numeric.
# Tauri's Windows bundlers reject versions with a `-suffix` outright
# (tauri-apps/tauri#5286), so `0.0.1-rc1` in tauri.conf.json would build on
# macOS and Linux and fail only here.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux (x86_64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x86_64)

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux webview dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Pong ${{ github.ref_name }}"
          releaseBody: |
            **Pong** is a menu-bar companion for people who live inside Claude.ai all day: a live
            usage dashboard with a real-time reset countdown, a scheduled session warm-up so the
            login screen is never what's waiting for you, and health checks that actually check
            health — a synthetic transaction, not a ping. Full rundown in the
            [README](https://github.com/neochaotic/pong#readme).

            ### Install

            | Platform | File | Notes |
            | --- | --- | --- |
            | macOS (Apple Silicon) | `.dmg` — aarch64 | drag to Applications |
            | macOS (Intel) | `.dmg` — x64 | drag to Applications |
            | Windows | `.msi` / `.exe` | `.msi` for managed installs |
            | Linux (any distro) | `.AppImage` | portable; `chmod +x` and run, no install |
            | Debian / Ubuntu | `.deb` | `sudo apt install ./Pong_*.deb` |
            | Fedora / RHEL / openSUSE | `.rpm` | `sudo dnf install ./Pong-*.rpm` |

            ### Before you open the app for the first time

            **These builds are not code-signed** (needs a paid Apple Developer account and a
            Windows code-signing certificate — not set up yet), so the OS blocks the first launch:

            - **macOS**: a plain double-click fails *silently* — Gatekeeper blocks it before the
              process starts, and since Pong is a menu-bar-only app (no Dock icon, no window),
              nothing visibly happens. It looks like the install did nothing even though it
              worked. Fix: right-click the app → *Open* → *Open* (once), or run
              `xattr -cr /Applications/Pong.app`.
            - **Windows**: SmartScreen warns — *More info* → *Run anyway*.

            Still no tray icon after that? That's a real bug, not this one — please open an issue.

            ### Before you file an issue

            Check the README's [Known issues](https://github.com/neochaotic/pong#known-issues-this-rc)
            section first — Windows/Linux popover rendering, tray icon coloring, and Google/passkey
            sign-in are documented limitations of the underlying webview, not surprises. Otherwise,
            [open an issue](https://github.com/neochaotic/pong/issues/new) with your OS and, if
            relevant, the log file (README → [Logs](https://github.com/neochaotic/pong#logs)).
          releaseDraft: true
          # Any tag carrying a suffix (v0.0.1-rc.1, -alpha.1, -beta.2) is flagged
          # as a pre-release, so it never shows up as "Latest release".
          prerelease: ${{ contains(github.ref_name, '-') }}
