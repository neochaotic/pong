name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:version
      - run: pnpm check
      # Fails below the 70% floor configured in vitest.config.ts.
      - run: pnpm test:coverage
      - run: pnpm build

  lint:
    name: Rust lint + coverage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux webview dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy, llvm-tools-preview" }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: taiki-e/install-action@cargo-llvm-cov

      # tauri-build embeds ../dist at compile time, so the frontend must exist.
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Format
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Coverage gate
        working-directory: src-tauri
        # lib/tray/main are wiring that only exists with a live app, tray and
        # webview; excluded from the gate, not from the build.
        run: |
          cargo llvm-cov --summary-only \
            --ignore-filename-regex '(lib|tray|main)\.rs$' \
            --fail-under-lines 70

  # Compiles and runs the Rust suite on every OS we ship. Catches
  # platform-specific breakage (path handling, conditional compilation,
  # webview APIs) that a Linux-only pipeline would miss.
  test-matrix:
    name: Test on ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS
          - platform: ubuntu-22.04
            label: Linux
          - platform: windows-latest
            label: Windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}

      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --all-targets

  # Produces the real installers on every OS. This is what proves the bundle
  # step works before a tag is pushed, rather than discovering it at release.
  bundle:
    name: Bundle on ${{ matrix.label }}
    needs: [frontend, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS
          - platform: ubuntu-22.04
            label: Linux
          - platform: windows-latest
            label: Windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev xvfb

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: bundle-${{ matrix.platform }}

      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Build installers
        run: pnpm tauri build

      # Smoke test: the app is tray-only and never exits on its own, so it is
      # run under a virtual display and expected to still be alive at the
      # deadline. A crash on startup exits early with its own status; a healthy
      # run is killed by `timeout` (124).
      #
      # The startup log is reported but not required. A headless runner has no
      # system tray and no a11y bus, so the app can legitimately run with less
      # output than on a desktop — failing on a missing log line would be
      # asserting on the runner's environment, not on the app.
      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          set +e
          xvfb-run -a timeout 20s ./src-tauri/target/release/pongllm > run.log 2>&1
          code=$?
          set -e

          echo "--- app output ---"
          cat run.log || true
          echo "------------------"

          if [ "$code" -ne 124 ] && [ "$code" -ne 0 ]; then
            echo "::error::app exited early with status $code (crash on startup)"
            exit 1
          fi

          if grep -q "monitor webview" run.log; then
            echo "App started and loaded the monitored page."
          else
            echo "::warning::app survived ${code}s but produced no page-load log \
              (expected on a headless runner without a tray)"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.label }}
          retention-days: 7
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
